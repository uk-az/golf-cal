name: infra-deploy
run-name: infra-deploy-${{ github.ref_name }}-${{ github.event_name }}

on:
  push:
    branches:
      - develop
      - main
    paths:
      - infra/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set parameters
        run: |
          echo "PARAM_FILE=infra/bicep/params/${ENV}.bicepparam" >> $GITHUB_ENV
          echo "RG=rg-${ENV}" >> $GITHUB_ENV

      - name: What-if (always)
        run: |
          az deployment group what-if \
            --name infra-${ENV}-${GITHUB_RUN_NUMBER} \
            --resource-group $RG \
            --template-file infra/bicep/main.bicep \
            --parameters $PARAM_FILE

      - name: Deploy (only main or manual)
        if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
        run: |
          az deployment group create \
            --mode Incremental \
            --name infra-${ENV}-${GITHUB_RUN_NUMBER} \
            --resource-group $RG \
            --template-file infra/bicep/main.bicep \
            --parameters $PARAM_FILE